<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracking Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f4; }  
        h1 { color: #333; }
        .container { max-width: 800px; margin: auto; background: #fff; padding: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .expenses { margin: 20px 0; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        th { background-color: #f2f2f2; }
        .summary { margin: 20px 0; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Expense Tracking Dashboard</h1>
        <div class="expenses">
            <h2>Expense Listing</h2>
            <table>
                <tr>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Amount</th>
                </tr>
                <tr>
                    <td>2026-04-01</td>
                    <td>Lunch with friends</td>
                    <td>$20</td>
                </tr>
                <tr>
                    <td>2026-04-05</td>
                    <td>Transport</td>
                    <td>$15</td>
                </tr>
            </table>
        </div>
        <div class="summary">
            <h2>Summary Statistics</h2>
            <p>Total Expenses: $35</p>
            <p>Average Expense: $17.50</p>
            <p>Number of Expenses: 2</p>
        </div>
    </div>
</body>
</html>
